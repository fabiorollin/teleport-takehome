# ClusterIP service in front of the Nginx pods.
# Reached by the NGINX Ingress controller via the Ingress resource.
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: nginx-app
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
